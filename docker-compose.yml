
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./src/fsm/servers:/app/src/FSM/servers
    restart: unless-stopped
    depends_on:
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: src/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    restart: unless-stopped

# Using host bind mounts for server data; no named volumes declared
