version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./servers:/app/servers
      - ./database.db:/app/database.db
      - ./.flask_secret.key:/app/.flask_secret.key
      - ./.factorio_token.key:/app/.factorio_token.key
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - ENVIRONMENT=production
      - HOST=0.0.0.0
      - PORT=8000
    restart: unless-stopped

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - BUN_PUBLIC_API_URL=http://localhost:8000
    restart: unless-stopped
    depends_on:
      - backend
